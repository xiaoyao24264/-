<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凌悦电竞数据</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#090a0d;--bg-glass:rgba(14,15,20,0.82);--bg-card:rgba(16,17,23,0.90);--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.14);--accent:#d4490f;--accent-glow:rgba(212,73,15,0.35);--accent-dim:rgba(212,73,15,0.12);--accent2:#ff6f00;--text:#e8e4dc;--text-dim:#7a776e;--text-muted:#3e3c38;--gold:#c9a96e;--radius:18px;--radius-sm:10px;--blur:blur(24px) saturate(180%)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;background-image:linear-gradient(165deg,rgba(212,73,15,0.04) 0%,transparent 40%,transparent 60%,rgba(255,111,0,0.03) 100%),url('/static/bg.jpg');background-size:cover;background-position:center;background-attachment:fixed;font-size:14px}
.header{background:var(--bg-glass);backdrop-filter:var(--blur);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1320px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#f5f0e8 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px;font-family:'Inter',sans-serif}
.logo span{opacity:0.6;font-weight:400}
.game-tabs{display:flex;gap:3px;background:rgba(255,255,255,0.04);padding:3px;border-radius:12px;border:1px solid var(--border)}
.game-tab{padding:7px 20px;border-radius:9px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);white-space:nowrap;letter-spacing:0.2px}
.game-tab:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.game-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow),0 0 0 1px rgba(255,255,255,0.06)}
.game-tab.locked{opacity:0.35;cursor:default}
.sub-nav{background:rgba(9,10,13,0.6);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.sub-nav-inner{max-width:1320px;margin:0 auto;padding:0 32px;display:flex}
.sub-btn{background:transparent;border:none;color:var(--text-dim);padding:14px 18px;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;transition:all 0.2s;font-weight:500;letter-spacing:0.1px}
.sub-btn:hover{color:var(--text)}
.sub-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.main{max-width:1320px;margin:0 auto;padding:28px 32px}
.card{background:var(--bg-card);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4),0 1px 4px rgba(0,0,0,0.3);transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
.card:hover{border-color:var(--border-hover);box-shadow:0 8px 40px rgba(0,0,0,0.55),0 0 20px var(--accent-glow);transform:translateY(-1px)}
.card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:700;color:var(--text);letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.card-body{padding:18px 22px}
.card-body.no-pad{padding:0}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity 0.3s}
.stat-card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.stat-card:hover::before{opacity:1}
.stat-card .val{font-size:36px;font-weight:900;background:linear-gradient(135deg,#f0ebe0,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;line-height:1.1}
.stat-card .label{font-size:11px;color:var(--text-dim);margin-top:6px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
.hero{background:linear-gradient(135deg,rgba(212,73,15,0.08) 0%,rgba(16,14,12,0.0) 100%);border:1px solid rgba(212,73,15,0.18);border-radius:var(--radius);padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-5%;width:320px;height:320px;background:radial-gradient(circle,rgba(212,73,15,0.07) 0%,transparent 70%);pointer-events:none}
.hero-left h2{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.3px}
.hero-left p{font-size:13px;color:var(--text-dim)}
.hero-right{text-align:right;flex-shrink:0}
.hero-right .big-num{font-size:44px;font-weight:900;background:linear-gradient(135deg,#f0ebe0,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;letter-spacing:-2px}
.hero-right .sub{font-size:11px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.refresh-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.2s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.content-grid{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
@media(max-width:1000px){.content-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
.table-wrap{overflow-x:auto}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th{text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01);white-space:nowrap}
.table-wrap td{padding:13px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tr:hover td{background:rgba(255,255,255,0.02)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;font-size:12px;font-weight:800;background:rgba(255,255,255,0.04);color:var(--text-dim)}
.rank-badge.gold{background:rgba(201,169,110,0.15);color:var(--gold)}
.rank-badge.silver{background:rgba(148,163,184,0.12);color:#94a3b8}
.rank-badge.bronze{background:rgba(180,83,9,0.15);color:#b45309}
.win-bar-wrap{display:flex;align-items:center;gap:8px}
.win-bar{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;min-width:60px}
.win-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.win-bar-rate{font-size:12px;color:var(--text-dim);min-width:38px}
.team-logo{width:24px;height:24px;border-radius:5px;background:rgba(255,255,255,0.05);margin-right:8px;object-fit:contain;vertical-align:middle}
.no-logo{display:inline-block;width:24px;height:24px;border-radius:5px;background:rgba(255,255,255,0.05);margin-right:8px;vertical-align:middle}
.match-list{display:flex;flex-direction:column;gap:6px}
.match-card{background:rgba(255,255,255,0.025);border-radius:var(--radius-sm);padding:13px 16px;display:flex;align-items:center;border:1px solid transparent;transition:all 0.2s cubic-bezier(0.4,0,0.2,1)}
.match-card:hover{background:rgba(255,255,255,0.04);border-color:var(--border)}
.match-team{flex:1;min-width:0;display:flex;align-items:center}
.match-team.right{justify-content:flex-end}
.match-team .badge{font-size:9px;font-weight:800;padding:2px 0;border-radius:5px;text-transform:uppercase;letter-spacing:0.5px;min-width:30px;text-align:center;flex-shrink:0;margin-right:8px}
.badge.win{background:rgba(34,197,94,0.18);color:#4ade80}
.badge.loss{background:rgba(255,255,255,0.05);color:var(--text-muted)}
.match-team .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-team .logo{width:20px;height:20px;border-radius:4px;background:rgba(255,255,255,0.05);flex-shrink:0;object-fit:contain;margin-left:8px}
.match-score{font-size:14px;font-weight:800;min-width:52px;text-align:center;flex-shrink:0;color:var(--text)}
.match-score .won{color:#4ade80}
.match-score .lost{color:var(--text-muted)}
.match-vs{color:var(--text-muted);font-size:10px;font-weight:600;padding:0 6px;flex-shrink:0}
.match-info{text-align:right;min-width:70px;flex-shrink:0}
.match-info .time{font-size:11px;color:var(--text-dim)}
.match-info .league{font-size:10px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.league-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
.league-item:last-child{border-bottom:none}
.league-item .name{color:var(--text);font-weight:500}
.league-item .tier{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:0.5px}
.tier.premium{background:rgba(201,169,110,0.12);color:var(--gold)}
.tier.pro{background:var(--accent-dim);color:var(--accent)}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.rank-item:last-child{border-bottom:none}
.rank-item .rk{font-size:12px;color:var(--text-dim);min-width:20px}
.rank-item .logo{width:22px;height:22px;border-radius:4px;background:rgba(255,255,255,0.05);object-fit:contain;flex-shrink:0}
.rank-item .name{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-item .wr{font-size:13px;font-weight:700;color:var(--gold)}
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:14px}
.coming-soon .icon{font-size:72px;opacity:0.5}
.coming-soon h2{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.coming-soon p{color:var(--text-dim);font-size:14px;max-width:380px;line-height:1.9}
.coming-soon .badge{display:inline-block;background:var(--accent-dim);color:var(--accent);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:0.5px;margin-top:6px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);z-index:1000;align-items:center;justify-content:center;padding:24px}
.modal-overlay.active{display:flex}
.modal-box{background:rgba(16,17,23,0.96);backdrop-filter:blur(30px) saturate(180%);border:1px solid var(--border-hover);border-radius:22px;width:100%;max-width:700px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,0.7),0 0 40px rgba(212,73,15,0.08)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h3{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.modal-close{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s}
.modal-close:hover{background:rgba(255,255,255,0.08);color:var(--text);border-color:var(--border-hover)}
.modal-body{padding:26px;overflow-y:auto;flex:1}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-track{background:transparent}
.modal-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
.team-name-link{color:var(--text);cursor:pointer;transition:color 0.15s;text-decoration:none;font-weight:600}
.team-name-link:hover{color:var(--gold)}
.loading{text-align:center;padding:48px;color:var(--text-dim);font-size:13px}
.empty{text-align:center;padding:48px;color:var(--text-muted);font-size:13px}
footer{text-align:center;padding:40px 24px;color:var(--text-muted);font-size:12px;border-top:1px solid var(--border);margin-top:48px}
footer a{color:var(--text-dim);text-decoration:none}
footer a:hover{color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="logo">凌悦<span>电竞数据</span></div><div class="game-tabs"><button class="game-tab active" onclick="switchGame('dota2')" id="tab-btn-dota2">🏔️ DOTA2</button><button class="game-tab locked" onclick="return false" id="tab-btn-lol">🔥 LOL <span style="font-size:10px;opacity:0.6">🔜</span></button></div></div></header>
<div class="sub-nav" id="sub-nav"><div class="sub-nav-inner"><button class="sub-btn active" onclick="showSub('rankings')" id="sub-btn-rankings">🏆 排名</button><button class="sub-btn" onclick="showSub('recent')" id="sub-btn-recent">📊 近期赛果</button></div></div>
<div id="lol-coming-soon" class="tab-content"><div class="main"><div class="coming-soon"><div class="icon">🔥</div><h2>League of Legends</h2><p>LOL 赛区数据正在获取中。<br>由于数据源限制，需要绑定境外服务器后上线。</p><span class="badge">敬请期待</span></div></div></div>
<div id="dota2-content" class="main">
<div class="hero"><div class="hero-left"><h2>DOTA2 全球战队排名</h2><p>数据来源：OpenDota · 每6小时自动更新</p></div><div class="hero-right"><div class="big-num" id="total-teams">-</div><div class="sub">收录战队</div></div></div>
<div class="stats-row" id="stats-row"><div class="stat-card"><div class="val" id="stat-teams">-</div><div class="label">收录战队</div></div><div class="stat-card"><div class="val" id="stat-matches">-</div><div class="label">近期比赛</div></div><div class="stat-card"><div class="val" id="stat-leagues">-</div><div class="label">收录联赛</div></div></div>
<div class="content-grid" id="content-grid">
<div>
<div id="tab-rankings" class="tab-content active">
<div class="card"><div class="card-header"><div class="card-title"><span class="dot"></span>战队排名 TOP 50</div><button class="refresh-btn" onclick="loadRankings()">↻ 刷新</button></div><div class="card-body no-pad"><div class="table-wrap"><table><thead><tr><th style="width:44px">#</th><th>战队</th><th style="width:80px">Rating</th><th style="width:100px">胜/负</th><th style="width:120px">胜率</th></tr></thead><tbody id="rankings-body"><tr><td colspan="5"><div class="loading">加载中...</div></td></tr></tbody></table></div></div></div>
</div>
<div id="tab-recent" class="tab-content">
<div class="card"><div class="card-header"><div class="card-title"><span class="dot"></span>近期赛果</div><button class="refresh-btn" onclick="loadRecent()">↻ 刷新</button></div><div class="card-body" style="padding:12px 16px"><div class="match-list" id="recent-list"><div class="loading">加载中...</div></div></div></div>
</div>
</div>
<div>
<div class="card" style="margin-bottom:16px"><div class="card-header"><div class="card-title"><span class="dot" style="background:var(--gold);box-shadow:0 0 8px rgba(201,169,110,0.6)"></span>热门联赛</div></div><div class="card-body" style="padding:12px 16px"><div id="leagues-list"><div class="loading">加载中...</div></div></div></div>
<div class="card"><div class="card-header"><div class="card-title"><span class="dot" style="background:#4ade80;box-shadow:0 0 8px rgba(74,222,128,0.6)"></span>胜率排行</div></div><div class="card-body no-pad" style="padding:12px 16px"><div id="top-winrate-list"><div class="loading">加载中...</div></div></div></div>
</div>
</div>
</div>
<footer><p>DOTA2 数据来源 <a href="https://www.opendota.com" target="_blank">OpenDota</a> · LOL 数据暂不可用 · 备案完成后开放</p><p style="margin-top:6px;opacity:0.4">© 2026 凌悦电竞数据</p></footer>
<div class="modal-overlay" id="team-modal" onclick="if(event.target===this)closeTeamDetail()"><div class="modal-box"><div class="modal-header"><h3 id="modal-team-name">战队详情</h3><button class="modal-close" onclick="closeTeamDetail()">×</button></div><div class="modal-body" id="modal-team-body"><div class="loading">加载中...</div></div></div></div>
<script>
const API=window.location.origin;let currentGame='dota2';
function switchGame(game){if(game==='lol')return;currentGame=game;document.querySelectorAll('.game-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-btn-'+game).classList.add('active');document.getElementById('sub-nav').style.display=game==='dota2'?'block':'none';document.getElementById('dota2-content').style.display=game==='dota2'?'block':'none';document.getElementById('lol-coming-soon').classList.toggle('active',game==='lol');if(game==='dota2')loadAll()}
function showSub(tab){document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));document.getElementById('sub-btn-'+tab).classList.add('active');document.querySelectorAll('#tab-rankings,#tab-recent').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active')}
function fmtTime(ts){if(!ts)return'-';const d=new Date(typeof ts==='string'?ts:ts*1000);return`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`}
async function fetchJSON(url){try{const r=await fetch(url);return r.ok?r.json():null}catch{return null}}
function rankClass(rank){if(rank===1)return'gold';if(rank===2)return'silver';if(rank===3)return'bronze';return''}
function imgError(img){img.style.display='none'}
async function loadRankings(){const data=await fetchJSON(API+'/rankings/?limit=50');const tbody=document.getElementById('rankings-body');if(!data||!data.length){tbody.innerHTML='<tr><td colspan="5"><div class="empty">暂无数据</div></td></tr>';return}let html='';data.forEach(t=>{const rc=rankClass(t.rank);const logo=t.logo_url?`<img class="team-logo" src="${t.logo_url}" onerror="imgError(this)">`:'<span class="no-logo"></span>';html+=`<tr><td><span class="rank-badge ${rc}">${t.rank}</span></td><td>${logo}<span class="team-name-link" onclick="openTeamDetail(${t.team_id},'${(t.name||'').replace(/'/g,"\\'")}')">${t.name||'Unknown'}</span></td><td style="color:var(--gold);font-weight:700;font-size:14px">${Math.round(t.rating)}</td><td style="color:var(--text-dim)">${t.wins} / ${t.losses}</td><td><div class="win-bar-wrap"><div class="win-bar"><div class="win-bar-fill" style="width:${t.win_rate}%"></div></div><span class="win-bar-rate">${t.win_rate}%</span></div></td></tr>`});tbody.innerHTML=html;document.getElementById('stat-teams').textContent=data.length;document.getElementById('total-teams').textContent=data.length;const topWR=[...data].filter(t=>(t.wins+t.losses)>=20).sort((a,b)=>b.win_rate-a.win_rate).slice(0,5);const wrList=document.getElementById('top-winrate-list');if(topWR.length){wrList.innerHTML=topWR.map(t=>{const logo=t.logo_url?`<img class="logo" src="${t.logo_url}" onerror="this.style.display='none'">`:'';return`<div class="rank-item"><span class="rk">${t.rank}</span>${logo}<span class="name">${t.name||'Unknown'}</span><span class="wr">${t.win_rate}%</span></div>`}).join('')}}
async function loadRecent(){const data=await fetchJSON(API+'/matches/recent?limit=30');const list=document.getElementById('recent-list');if(!data||!data.length){list.innerHTML='<div class="empty">暂无比赛记录</div>';return}document.getElementById('stat-matches').textContent=data.length;list.innerHTML=data.slice(0,20).map(m=>{const rWon=m.radiant_win;const rName=m.radiant_name||'Radiant',dName=m.dire_name||'Dire';const rLogo=m.radiant_team_id?`<img class="logo" src="https://api.opendota.com/api/teams/${m.radiant_team_id}/logo" onerror="this.style.display='none'">`:'';const dLogo=m.dire_team_id?`<img class="logo" src="https://api.opendota.com/api/teams/${m.dire_team_id}/logo" onerror="this.style.display='none'">`:'';return`<div class="match-card"><div class="match-team" style="text-align:right"><span class="badge ${rWon?'win':'loss'}">${rWon?'胜':'负'}</span><span class="name" style="${rWon?'':'opacity:0.5'}">${rName}</span>${rLogo}</div><div class="match-score"><span class="${rWon?'won':'lost'}">${m.radiant_score}</span><span style="color:var(--text-muted);font-size:12px">:</span><span class="${!rWon?'won':'lost'}">${m.dire_score}</span></div><div class="match-team right">${dLogo}<span class="name" style="${!rWon?'':'opacity:0.5'}">${dName}</span><span class="badge ${!rWon?'win':'loss'}">${!rWon?'胜':'负'}</span></div><div class="match-info"><div class="time">${fmtTime(m.start_time)}</div><div class="league">${m.league_name||'职业联赛'}</div></div></div>`}).join('')}
async function loadLeagues(){const data=await fetchJSON(API+'/leagues?limit=20');const list=document.getElementById('leagues-list');if(!data||!data.length){document.getElementById('stat-leagues').textContent='-';list.innerHTML='<div class="empty">暂无联赛数据</div>';return}document.getElementById('stat-leagues').textContent=data.length;const major=data.filter(l=>l.tier==='premium'||l.tier==='professional').slice(0,8);if(!major.length)major=data.slice(0,8);list.innerHTML=major.map(l=>{const tc=l.tier==='premium'?'premium':'pro';return`<div class="league-item"><span class="name">${l.name||'Unknown'}</span><span class="tier ${tc}">${(l.tier||'').toUpperCase()}</span></div>`}).join('')}
function openTeamDetail(teamId,teamName){document.getElementById('team-modal').classList.add('active');document.getElementById('modal-team-name').textContent=teamName||'加载中...';document.getElementById('modal-team-body').innerHTML='<div class="loading">加载中...</div>';document.body.style.overflow='hidden';fetchTeamDetail(teamId)}
function closeTeamDetail(){document.getElementById('team-modal').classList.remove('active');document.body.style.overflow=''}

ont-size:10px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px">胜率</div></div></div></div><div style="background:rgba(212,73,15,0.08);border:1px solid rgba(212,73,15,0.2);border-radius:14px;padding:20px;text-align:center;margin-bottom:24px"><div style="font-size:36px;font-weight:900;background:linear-gradient(135deg,#f0ebe0,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${Math.round(team.rating||0)}</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px">战队 Rating</div></div>`;if(players.length>0){html+=`<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">现役成员 (${players.length}人)</div><div style="display:flex;gap:8px;flex-wrap:wrap">`;for(const p of players){const wr=p.games_played>0?Math.round(p.wins/p.games_played*100):0;html+=`<div style="background:rgba(255,255,255,0.04);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)"><img src="https://api.opendota.com/api/players/${p.account_id}/avatar" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06)" onerror="this.style.display='none'"><div><div style="font-size:13px;font-weight:600">${p.name||'Unknown'}</div><div style="font-size:11px;color:var(--
